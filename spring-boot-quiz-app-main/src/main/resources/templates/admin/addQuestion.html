<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congnitiosphere | Add Question</title>
    <style>
        :root {
            --ink: #1f2937; --muted: #64748b; --brand: #0f766e; --brand-dark: #134e4a; --accent: #f59e0b;
            --surface: rgba(255, 252, 246, 0.9); --border: rgba(15, 118, 110, 0.14); --shadow: 0 24px 60px rgba(31, 41, 55, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; font-family: "Trebuchet MS", "Segoe UI", sans-serif; color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(245, 158, 11, 0.24), transparent 24%),
                radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.22), transparent 22%),
                linear-gradient(135deg, #f8f4ea 0%, #eef8f6 52%, #f6efe3 100%);
        }
        .page-shell { max-width: 1080px; margin: 0 auto; padding: 24px 24px 48px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
        .brand { font-size:1.5rem; font-weight:800; letter-spacing:0.05em; text-transform:uppercase; color:var(--brand-dark); }
        .brand span { color: var(--accent); }
        .nav-links { display:flex; gap:12px; flex-wrap:wrap; }
        .nav-links a, button { text-decoration:none; padding:12px 18px; border-radius:999px; font-weight:800; font-size:1rem; border:none; cursor:pointer; transition:transform 0.2s ease; }
        .nav-links a:hover, button:hover { transform: translateY(-2px); }
        .primary, button { color:#fff; background:linear-gradient(135deg, var(--brand), #14b8a6); box-shadow:0 16px 28px rgba(15, 118, 110, 0.22); }
        .secondary { color:var(--brand-dark); background:rgba(255,255,255,0.74); border:1px solid rgba(15,118,110,0.16); }
        .hero, .form-card { background:var(--surface); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow); backdrop-filter:blur(10px); }
        .hero, .form-card { padding:28px; }
        .hero { margin-bottom:22px; }
        .eyebrow { display:inline-flex; padding:8px 14px; border-radius:999px; background:rgba(15,118,110,0.1); color:var(--brand-dark); font-size:0.84rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
        h1 { margin:16px 0 10px; font-size:clamp(2rem,5vw,3.3rem); line-height:1; letter-spacing:-0.04em; }
        p { margin:0; color:var(--muted); line-height:1.72; }
        form { display:grid; gap:18px; }
        .field { display:grid; gap:8px; }
        label { font-weight:800; color:var(--brand-dark); }
        input[type="text"], select {
            width:100%; padding:14px 16px; border-radius:18px; border:1px solid rgba(15,118,110,0.18); background:#fff; font-size:1rem; color:var(--ink);
        }
        input:focus, select:focus { outline:2px solid rgba(20,184,166,0.24); border-color:rgba(15,118,110,0.45); }
        @media (max-width:640px) {
            .page-shell { padding:18px 16px 34px; }
            .hero, .form-card { border-radius:22px; }
        }
    </style>
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <div class="brand">Congnitio<span>sphere</span></div>
        <nav class="nav-links">
            <a class="secondary" href="/admin/home">Dashboard</a>
            <a class="secondary" href="/admin/manageQuizzes">Manage Quizzes</a>
            <a class="secondary" href="/logout">Logout</a>
        </nav>
    </header>

    <section class="hero">
        <div class="eyebrow">Question builder</div>
        <h1>Add a stronger question.</h1>
        <p>Write the prompt, define three answer choices, and mark the correct option so this quiz is ready for learners.</p>
    </section>

    <section class="form-card">
        <form th:action="@{/admin/quizzes/{quizId}/questions(quizId=${quizId})}" th:object="${question}" method="post">
            <div class="field">
                <label for="text">Question</label>
                <input type="text" id="text" name="text" th:value="*{text}" placeholder="Enter the question prompt" required>
            </div>
            <div class="field">
                <label for="optionA">Option A</label>
                <input type="text" id="optionA" name="optionA" th:value="*{optionA}" placeholder="First answer choice" required>
            </div>
            <div class="field">
                <label for="optionB">Option B</label>
                <input type="text" id="optionB" name="optionB" th:value="*{optionB}" placeholder="Second answer choice" required>
            </div>
            <div class="field">
                <label for="optionC">Option C</label>
                <input type="text" id="optionC" name="optionC" th:value="*{optionC}" placeholder="Third answer choice" required>
            </div>
            <div class="field">
                <label for="correctAnswer">Correct answer</label>
                <select id="correctAnswer" name="correctAnswer" required>
                    <option value="">Select the correct option</option>
                    <option value="A">Option A</option>
                    <option value="B">Option B</option>
                    <option value="C">Option C</option>
                </select>
            </div>
            <div>
                <button type="submit">Add Question</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
