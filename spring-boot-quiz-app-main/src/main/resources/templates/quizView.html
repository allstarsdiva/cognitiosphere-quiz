<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Congnitiosphere | ' + ${quiz.title}">Congnitiosphere | Quiz</title>
    <style>
        :root { --ink:#1f2937; --muted:#64748b; --brand:#0f766e; --brand-dark:#134e4a; --accent:#f59e0b; --surface:rgba(255,252,246,0.9); --border:rgba(15,118,110,0.14); --shadow:0 24px 60px rgba(31,41,55,0.12);}
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; font-family:"Trebuchet MS","Segoe UI",sans-serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(245,158,11,0.24), transparent 24%),radial-gradient(circle at bottom right, rgba(15,118,110,0.22), transparent 22%),linear-gradient(135deg,#f8f4ea 0%,#eef8f6 52%,#f6efe3 100%); }
        .page-shell { max-width:1080px; margin:0 auto; padding:24px; }
        .hero,.question-card { background:var(--surface); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow); backdrop-filter:blur(10px); }
        .hero,.question-card { padding:28px; }
        .hero { margin-bottom:22px; }
        .eyebrow { display:inline-flex; padding:8px 14px; border-radius:999px; background:rgba(15,118,110,0.1); color:var(--brand-dark); font-size:0.84rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
        h1,h2 { margin:16px 0 10px; line-height:1.15; letter-spacing:-0.04em; }
        h1 { font-size:clamp(2rem,5vw,3.2rem); }
        h2 { font-size:1.2rem; }
        p { margin:0; color:var(--muted); line-height:1.72; }
        .question-list { display:grid; gap:18px; }
        .options { margin-top:14px; display:grid; gap:10px; }
        .option { padding:14px 16px; border-radius:18px; background:rgba(255,255,255,0.78); border:1px solid rgba(15,118,110,0.12); color:var(--ink); }
    </style>
</head>
<body>
<div class="page-shell">
    <section class="hero">
        <div class="eyebrow">Quiz preview</div>
        <h1 th:text="${quiz.title}">Quiz Title</h1>
        <p>This preview screen shows the quiz content in a cleaner read-only layout. Use the live challenge page to take the quiz with timer and submission flow.</p>
    </section>
    <section class="question-list">
        <article class="question-card" th:each="question, stat : ${questions}">
            <h2 th:text="'Question ' + ${stat.count} + ': ' + ${question.text}">Question Text</h2>
            <div class="options">
                <div class="option"><strong>A.</strong> <span th:text="${question.optionA}">Option A</span></div>
                <div class="option"><strong>B.</strong> <span th:text="${question.optionB}">Option B</span></div>
                <div class="option"><strong>C.</strong> <span th:text="${question.optionC}">Option C</span></div>
            </div>
        </article>
    </section>
</div>
</body>
</html>
